micronaut:
  application:
    name: bff-gateway
  server:
    port: 8082
    context-path: /v1/bff
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
        descriptions: true
    binders:
      jvm:
        enabled: true
      web:
        enabled: true
        server:
          percentiles: [0.5, 0.95, 0.99]
          histogram: true
        client:
          enabled: true
          percentiles: [0.5, 0.95, 0.99]
          histogram: true
      uptime:
        enabled: true
      processor:
        enabled: true
  http:
    services:
      iam:
        url: ${bff.iam-base-url}
      mcp:
        url: ${bff.mcp-base-url}
      ai:
        url: ${bff.ai-base-url}
        read-timeout: 120s

endpoints:
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    sensitive: false

bff:
  iam-base-url: ${IAM_BASE_URL:http://localhost:8080/v1/iam}
  mcp-base-url: ${MCP_BASE_URL:http://localhost:8081}
  ai-base-url: ${AI_BASE_URL:http://localhost:8083}
  policy-base-url: ${POLICY_BASE_URL:http://localhost:8085/v1/policy}
  audit-base-url: ${AUDIT_BASE_URL:http://localhost:8086/v1/audit}
  knowledge-base-url: ${KNOWLEDGE_BASE_URL:http://localhost:8088/v1/knowledge}
  config-base-url: ${CONFIG_BASE_URL:http://localhost:8084/v1/config}
